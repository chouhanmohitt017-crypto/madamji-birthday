<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Beautiful Memories ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e, #fbc2eb, #a18cd1);
            overflow: hidden;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 25px;
            text-align: center;

            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .2);
        }

        h1 {
            color: white;
            margin-bottom: 20px;
        }

        .slider {
            width: 100%;
            height: 420px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, .3);
        }

        .slider img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .slider img.active {
            display: block;
            animation: fade 1s;
        }

        @keyframes fade {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            background: white;
            color: #ff4d88;
            font-weight: bold;
        }

        .petal {
            position: absolute;
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: drop linear infinite;
        }

        @keyframes drop {
            0% {
                transform: translateY(-100px);
            }

            100% {
                transform: translateY(110vh);
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📸 Our Sweet Memories ❤️</h1>

        <div class="slider">

            <img src="photo1.jpg" class="active">
            <img src="photo2.jpg">
            <img src="photo3.jpg">
            <img src="photo4.jpg">

        </div>

        <a href="reasons.html" class="btn">
            Next Page ➜
        </a>

    </div>

    <script>

        /* PHOTO SLIDER */

        let slides = document.querySelectorAll(".slider img");
        let index = 0;

        setInterval(() => {

            slides[index].classList.remove("active");

            index = (index + 1) % slides.length;

            slides[index].classList.add("active");

        }, 2500);


        /* ROSE PETALS */

        function petals() {

            let petal = document.createElement("div");

            petal.className = "petal";

            petal.innerHTML = "🌹";

            petal.style.left = Math.random() * 100 + "vw";

            petal.style.animationDuration =
                (Math.random() * 5 + 5) + "s";

            petal.style.fontSize =
                (Math.random() * 15 + 15) + "px";

            document.body.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, 10000);

        }

        setInterval(petals, 400);


        /* CONFETTI */

        function confetti() {

            let c = document.createElement("div");

            c.className = "confetti";

            c.style.left = Math.random() * 100 + "vw";

            c.style.background =
                ["#ff4d88", "#fff", "#ffd700", "#00ffff"][Math.floor(Math.random() * 4)];

            c.style.animationDuration =
                (Math.random() * 3 + 3) + "s";

            document.body.appendChild(c);

            setTimeout(() => {
                c.remove();
            }, 6000);

        }

        setInterval(confetti, 150);

    </script>
    <a href="reasons.html" class="btn">
        Next Page ➜
    </a>
</body>

</html>
